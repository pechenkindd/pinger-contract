syntax = "proto3";

package pinger.v1;

import "buf/validate/validate.proto";
import "google/protobuf/duration.proto";
import "pinger/v1/payload_message.proto";
import "google/api/annotations.proto";

// Тестовый сервис
service PingerService {
  // Тестовая ручка
  rpc Ping(PingRequest) returns (PingResponse) {
    option (google.api.http) = {
      post: "/v1/ping"
      body: "*"
    };
  };
}

// Запрос ручки Ping
message PingRequest {
  // UUID узла который надо пингануть
  string node_id = 1 [(buf.validate.field).string.uuid = true];
  // Таймаут на пинг
  google.protobuf.Duration timeout = 2 [(buf.validate.field).duration.lt = {
    seconds: 10
  }];

  // Сообщение из payload_message.proto
  Payload payload = 3;
}

// Ответ ручки Ping
message PingResponse {
  // Результат пинга
  bool success = 1;
}
